id: saltedlolly-audiobookshelf
name: ABS NAS Edition
tagline: Audiobookshelf with NAS support
category: Media
version: "2.35.0.1"
icon: https://raw.githubusercontent.com/saltedlolly/umbrel-app-store-gallery/master/saltedlolly-audiobookshelf/icon.svg
port: 23378
description: >-
  Audiobookshelf NAS Edition adds support for accessing network shares from within Audiobookshelf, allowing you to access your media files stored on NAS/SMB/NFS shares.
 

  ⚠️ IMPORTANT - READ THIS BEFORE INSTALLING!! 👇

  
  If you are currently using the Audiobookshelf app from the Umbrel App Store, please read this carefully:


  - When switching from the Audiobookshelf app in the Umbrel App Store to this NAS Edition, library data is NOT preserved.
  
  - Make sure you BACK UP your existing Audiobookshelf library before proceeding, or you will need to recreate your library from scratch.

  - You must uninstall the existing Audiobookshelf app before installing this edition, but doing so, will delete your existing library data. This includes all user accounts, libraries and metadata. (Your media files will be preserved.)
  
  - You can use the 'ABS Library Migration Tool' to help you migrate your existing library from the official app. See the instructions here: https://github.com/saltedlolly/umbrel-app-store/tree/master/saltedlolly-audiobookshelf/tools#readme


  Audioookshelf - NAS Edition Features:

  
  - Audiobookshelf can access your media stored on a network share elsewhere on your local network (e.g. NAS, SMB, NFS, etc.)

  - Mount any network share in the Umbrel Files app and it is immediately accessible to Audiobookshelf

  - Specify which shares are required by Audiobookshelf using the provided Network Share Config Tool

  - After a system restart, Audiobookshelf will wait for the required network shares to become available before starting up, preventing errors due to missing media.

  - Local folders for Audiobooks and Podcasts are accessible in the Files app

  - Your user accounts, libraries & metadata, along with any Audiobooks and Podcasts stored on your Umbrel, are all backed up by Umbrel's backup system


  Direct Access URLs:

  - ABS Network Shares Config Tool: http://umbrel.local:23378 (opens from Umbrel dashboard icon)

  - Audiobookshelf Web App: http://umbrel.local:13378 (opens from ABS Network Shares Config Tool)

  
  ⚠️ After mounting a new network share in the Umbrel Files app, you will need to RESTART Audiobookshelf to access it. (Click the "Restart Audiobookshelf" button in the ABS Network Shares Config Tool.)


  Audiobookshelf - Main Features:


  - Fully open-source, including the android & iOS app (in beta)

  - Stream all audio formats on the fly

  - Search and add podcasts to download episodes w/ auto-download

  - Multi-user support w/ custom permissions

  - Keeps progress per user and syncs across devices

  - Auto-detects library updates, no need to re-scan

  - Upload books and podcasts w/ bulk upload drag and drop folders

  - Backup your metadata + automated daily backups

  - Progressive Web App (PWA)

  - Chromecast support on the web app and android app

  - Fetch metadata and cover art from several sources

  - Chapter editor and chapter lookup (using Audnexus API)

  - Merge your audio files into a single m4b

  - Embed metadata and cover image into your audio files (using Tone)

  - Basic ebook support and e-reader (experimental)


  Android App (beta)

  - Try it out on the Google Play Store


  iOS App (early beta)

  - Available using Test Flight: https://testflight.apple.com/join/wiic7QIW

